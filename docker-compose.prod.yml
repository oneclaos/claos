# Production Docker Compose with Nginx SSL
# Usage: docker-compose -f docker-compose.prod.yml up -d

services:
  # Nginx reverse proxy with SSL (host network for simplicity)
  nginx:
    image: nginx:alpine
    container_name: claos-nginx
    restart: unless-stopped
    network_mode: host
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./certbot/conf:/etc/letsencrypt:ro
      - ./certbot/www:/var/www/certbot:ro
    depends_on:
      claos:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "nginx", "-t"]
      interval: 30s
      timeout: 10s
      retries: 3
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "3"

  # Certbot for SSL certificates
  certbot:
    image: certbot/certbot
    container_name: claos-certbot
    volumes:
      - ./certbot/conf:/etc/letsencrypt
      - ./certbot/www:/var/www/certbot
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done;'"

  # Main application - host network for gateway access + terminal
  claos:
    build: .
    container_name: claos
    restart: unless-stopped
    # Run as current user for proper file permissions
    user: "${UID:-1000}:${GID:-1000}"
    # Host network to access gateways on 127.0.0.1
    network_mode: host
    environment:
      - NODE_ENV=production
      - DATA_DIR=/data
      - STRICT_SESSION_BINDING=false
      - PORT=3006
      - HOSTNAME=127.0.0.1
    env_file:
      - .env.local
    volumes:
      # Full /home access for file manager and terminal
      - /home:/home:rw
      # Persistent data directory
      - claos-data:/data
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://127.0.0.1:3006/api/auth', (r) => process.exit(r.statusCode < 500 ? 0 : 1)).on('error', () => process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    security_opt:
      - no-new-privileges:true
    tmpfs:
      - /tmp:mode=1777,size=100M
    ulimits:
      nofile:
        soft: 65536
        hard: 65536
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  claos-data:
    driver: local
